kind = "web"
previewPath = "/"
title = "ArriveLink"
version = "1.0.0"
id = "artifacts/arrivelink"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20190

[services.development]
run = "pnpm --filter @workspace/arrivelink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arrivelink", "run", "build" ]
publicDir = "artifacts/arrivelink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20190"
BASE_PATH = "/"
